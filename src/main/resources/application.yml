spring:
  h2:
    console:
      enabled: true
#      path: /h2-console

  web:
    resources:
      add-mappings: true
  datasource:
    url: jdbc:h2:mem:productDB
    driver-class-name: org.h2.Driver
    username: SA
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
